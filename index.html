    <style>
        /* SISTEMA DE DISEÑO ELITE */
        :root {
            --bg: #050505;
            --surface: #111111;
            --input-bg: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: #2a2a2a;
            --accent: #2196F3;
            --success: #2ed573;
            --warning: #ffb142;
            --danger: #ff4757;
            --radius: 12px;
            --main-width: 1200px;
        }

        body.light-mode {
            --bg: #f4f7f6; --surface: #ffffff; --input-bg: #f0f2f5;
            --text: #1a1a1a; --text-dim: #666; --border: #dcdde1;
            --accent: #1e90ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; padding: 30px 20px; transition: all 0.3s ease;
        }

        .workspace { 
            width: 100%; max-width: var(--main-width); display: flex; flex-direction: column; gap: 20px; 
            margin: 0 auto; animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); 
            padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 15px;
        }

        h1 { font-size: 1.6rem; color: var(--text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; cursor: pointer; user-select: none; text-align: center;}
        h1 span { color: var(--accent); }
        .subtitle { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; text-align: center; }

        /* CONTROLES SUPERIORES */
        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px;
            background: var(--input-bg); padding: 20px; border-radius: 10px; border: 1px solid var(--border);
        }
        @media (max-width: 900px) { .controls-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 600px) { .controls-grid { grid-template-columns: 1fr; } }

        .f-col { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.7rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;}
        
        input, select { 
            padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; 
            background: var(--surface); color: var(--text); font-size: 0.85rem; width: 100%; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent); }

        .btn-main {
            width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; 
            font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; transition: 0.2s;
        }
        .btn-main:hover { opacity: 0.9; }
        .btn-main:active { transform: scale(0.98); }

        /* TABLA DE RESULTADOS */
        .table-container {
            width: 100%; overflow-x: auto; border-radius: 10px; border: 1px solid var(--border);
            background: var(--input-bg); max-height: 50vh; overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left; }
        th { 
            background: var(--surface); color: var(--accent); padding: 12px 15px; 
            border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 0.7rem; 
            position: sticky; top: 0; z-index: 10; white-space: nowrap;
        }
        td { padding: 10px 15px; border-bottom: 1px solid var(--border); color: var(--text); }
        tr:hover { background: rgba(33, 150, 243, 0.05); }
        
        .badge { background: rgba(128,128,128,0.1); color: var(--text-dim); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); font-weight: bold; font-size: 0.7rem; white-space: nowrap;}
        .highlight { color: var(--success); font-weight: bold; }

        /* EDITOR PANEL */
        .editor-panel {
            background: rgba(33, 150, 243, 0.05); border: 1px dashed var(--accent); border-radius: 8px;
            padding: 20px; display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.3s ease;
        }
        .editor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        /* BOTONES ACCIÓN */
        .btn-export-html {
            width: 100%; padding: 16px; background: var(--success); color: #000; border: none;
            border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.2);
        }
        .btn-export-html:active { transform: scale(0.98); }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; 
            padding: 12px 25px; border-radius: 30px; font-weight: bold; display: none; z-index: 9999; font-size: 0.8rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: fadeIn 0.2s ease;
        }

        .stats-bar { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); font-weight: bold; text-transform: uppercase; align-items: center;}
        .btn-icon { background: transparent; border: none; cursor: pointer; color: var(--text-dim); font-size: 1rem; transition: 0.2s; }
        .btn-icon:hover { color: var(--accent); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="toast">✅ Acción completada</div>

    <div class="workspace">
        <div class="card">
            <div style="text-align: center;">
                <h1 onclick="toggleTheme()" title="Cambiar Tema">Matriz Tipificación <span>Elite</span></h1>
                <div class="subtitle">Bóveda Interactiva de Casos y Atenciones</div>
            </div>

            <div class="controls-grid">
                <div class="f-col">
                    <label>Búsqueda Global</label>
                    <input type="text" id="searchInput" placeholder="Buscar texto..." oninput="filterData()">
                </div>
                <div class="f-col">
                    <label>Filtro: 1er Nivel</label>
                    <select id="filter1" onchange="updateDropdowns(1); filterData()"><option value="">Todos</option></select>
                </div>
                <div class="f-col">
                    <label>Filtro: 2do Nivel</label>
                    <select id="filter2" onchange="updateDropdowns(2); filterData()"><option value="">Todos</option></select>
                </div>
                <div class="f-col">
                    <label>Filtro: 3er Nivel</label>
                    <select id="filter3" onchange="filterData()"><option value="">Todos</option></select>
                </div>
            </div>

            <div class="stats-bar">
                <span>Resultados: <span id="countResults" style="color: var(--accent);">0</span></span>
                <button class="btn-main" style="width: auto; padding: 8px 15px;" onclick="toggleEditor()">➕ Nuevo Registro</button>
            </div>

            <!-- PANEL DE EDICIÓN / CREACIÓN -->
            <div id="editorPanel" class="editor-panel">
                <div class="editor-grid">
                    <input type="hidden" id="editId">
                    <div class="f-col"><label>1er Nivel *</label><input type="text" id="in1"></div>
                    <div class="f-col"><label>2do Nivel *</label><input type="text" id="in2"></div>
                    <div class="f-col"><label>3er Nivel *</label><input type="text" id="in3"></div>
                    <div class="f-col"><label>4to Nivel</label><input type="text" id="in4"></div>
                    <div class="f-col"><label>Nivel de validación</label><input type="text" id="inVal"></div>
                    <div class="f-col"><label>Atención</label><input type="text" id="inAt"></div>
                    <div class="f-col"><label>Funcionalidad</label><input type="text" id="inFun"></div>
                    <div class="f-col"><label>Mundo</label><input type="text" id="inMun"></div>
                    <div class="f-col"><label>Aplica para</label><input type="text" id="inApp"></div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                    <button class="btn-main" style="width: 150px; background: transparent; border: 1px solid var(--border); color: var(--text);" onclick="toggleEditor()">Cancelar</button>
                    <button class="btn-main" style="width: 150px;" onclick="saveRecord()">💾 Guardar</button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Acción</th>
                            <th>1er Nivel</th>
                            <th>2do Nivel</th>
                            <th>3er Nivel</th>
                            <th>4to Nivel</th>
                            <th>Nivel Valid.</th>
                            <th>Atención</th>
                            <th>Mundo</th>
                            <th>Aplica Para</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <button class="btn-export-html" onclick="saveAndExportHTML()">💾 Guardar Bóveda y Exportar HTML</button>
    </div>

<script>
    let db = [];

    // --- TEMA CLARO / OSCURO ---
    if (localStorage.getItem('matrix_theme') === 'light') document.body.classList.add('light-mode');
    function toggleTheme() { 
        document.body.classList.toggle('light-mode'); 
        localStorage.setItem('matrix_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    // --- INICIALIZACIÓN ---
    window.onload = () => {
        const savedMeta = document.getElementById('matrixData').getAttribute('data-state');
        if (savedMeta && savedMeta.trim() !== "") {
            try { db = JSON.parse(decodeURIComponent(savedMeta)); } 
            catch (e) { console.error("Error leyendo bóveda", e); }
        }
        populateDropdowns();
        filterData();
    };

    // --- LÓGICA DE FILTROS EN CASCADA ---
    function getUniqueValues(key, filteredDB) {
        const vals = new Set();
        filteredDB.forEach(r => { if(r[key]) vals.add(r[key]); });
        return Array.from(vals).sort();
    }

    function populateDropdowns() {
        const f1 = document.getElementById('filter1');
        const f2 = document.getElementById('filter2');
        const f3 = document.getElementById('filter3');
        
        const vals1 = getUniqueValues('1er Nivel', db);
        f1.innerHTML = '<option value="">Todos</option>' + vals1.map(v => `<option value="${v}">${v}</option>`).join('');
        f2.innerHTML = '<option value="">Todos</option>';
        f3.innerHTML = '<option value="">Todos</option>';
    }

    function updateDropdowns(level) {
        const val1 = document.getElementById('filter1').value;
        const val2 = document.getElementById('filter2').value;
        
        let subDB = db;
        if(val1) subDB = subDB.filter(r => r['1er Nivel'] == val1);
        
        if (level === 1) {
            const vals2 = getUniqueValues('2do Nivel', subDB);
            document.getElementById('filter2').innerHTML = '<option value="">Todos</option>' + vals2.map(v => `<option value="${v}">${v}</option>`).join('');
            document.getElementById('filter3').innerHTML = '<option value="">Todos</option>';
        } 
        else if (level === 2) {
            if(val2) subDB = subDB.filter(r => r['2do Nivel'] == val2);
            const vals3 = getUniqueValues('3er Nivel', subDB);
            document.getElementById('filter3').innerHTML = '<option value="">Todos</option>' + vals3.map(v => `<option value="${v}">${v}</option>`).join('');
        }
    }

    // --- FILTRADO Y RENDERIZADO ---
    function filterData() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const f1 = document.getElementById('filter1').value;
        const f2 = document.getElementById('filter2').value;
        const f3 = document.getElementById('filter3').value;

        const results = db.filter(r => {
            if(f1 && r['1er Nivel'] !== f1) return false;
            if(f2 && r['2do Nivel'] !== f2) return false;
            if(f3 && r['3er Nivel'] !== f3) return false;
            
            if(q) {
                const str = Object.values(r).join(' ').toLowerCase();
                if(!str.includes(q)) return false;
            }
            return true;
        });

        renderTable(results);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        document.getElementById('countResults').innerText = data.length;

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:var(--text-dim); padding: 20px;">No se encontraron resultados</td></tr>`;
            return;
        }

        // Mostrar un máximo para no colgar el DOM
        const limit = Math.min(data.length, 300);
        
        for(let i=0; i<limit; i++) {
            const r = data[i];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="white-space: nowrap;">
                    <button class="btn-icon" onclick="editRecord('${r.id}')" title="Editar">✏️</button>
                    <button class="btn-icon" onclick="deleteRecord('${r.id}')" title="Borrar">🗑️</button>
                </td>
                <td style="font-weight:bold;">${r['1er Nivel']}</td>
                <td>${r['2do Nivel']}</td>
                <td class="highlight">${r['3er Nivel']}</td>
                <td>${r['4to Nivel'] || '-'}</td>
                <td><span class="badge">${r['Nivel de validación'] || '-'}</span></td>
                <td>${r['Atención'] || '-'}</td>
                <td><span class="badge" style="border-color:var(--accent); color:var(--accent);">${r['Mundo'] || '-'}</span></td>
                <td>${r['Aplica para'] || '-'}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    // --- CRUD ---
    function toggleEditor() {
        const panel = document.getElementById('editorPanel');
        if(panel.style.display === 'flex') {
            panel.style.display = 'none';
        } else {
            // Limpiar
            document.getElementById('editId').value = '';
            document.getElementById('in1').value = ''; document.getElementById('in2').value = '';
            document.getElementById('in3').value = ''; document.getElementById('in4').value = '';
            document.getElementById('inVal').value = ''; document.getElementById('inAt').value = '';
            document.getElementById('inFun').value = ''; document.getElementById('inMun').value = '';
            document.getElementById('inApp').value = '';
            panel.style.display = 'flex';
        }
    }

    function saveRecord() {
        const id = document.getElementById('editId').value;
        const r1 = document.getElementById('in1').value.trim();
        const r2 = document.getElementById('in2').value.trim();
        const r3 = document.getElementById('in3').value.trim();

        if(!r1 || !r2 || !r3) { alert("Los 3 primeros niveles son obligatorios."); return; }

        const newRec = {
            'id': id ? id : 'rec_' + Date.now(),
            '1er Nivel': r1, '2do Nivel': r2, '3er Nivel': r3,
            '4to Nivel': document.getElementById('in4').value.trim(),
            'Nivel de validación': document.getElementById('inVal').value.trim(),
            'Atención': document.getElementById('inAt').value.trim(),
            'Funcionalidad': document.getElementById('inFun').value.trim(),
            'Mundo': document.getElementById('inMun').value.trim(),
            'Aplica para': document.getElementById('inApp').value.trim()
        };

        if(id) {
            const idx = db.findIndex(x => x.id === id);
            if(idx > -1) db[idx] = newRec;
        } else {
            db.unshift(newRec); // Agregar arriba
        }

        toggleEditor();
        populateDropdowns();
        filterData();
        updateMetaState();
        showToast('✅ Registro guardado');
    }

    function editRecord(id) {
        const r = db.find(x => x.id === id);
        if(!r) return;
        document.getElementById('editorPanel').style.display = 'flex';
        document.getElementById('editId').value = r.id;
        document.getElementById('in1').value = r['1er Nivel'] || '';
        document.getElementById('in2').value = r['2do Nivel'] || '';
        document.getElementById('in3').value = r['3er Nivel'] || '';
        document.getElementById('in4').value = r['4to Nivel'] || '';
        document.getElementById('inVal').value = r['Nivel de validación'] || '';
        document.getElementById('inAt').value = r['Atención'] || '';
        document.getElementById('inFun').value = r['Funcionalidad'] || '';
        document.getElementById('inMun').value = r['Mundo'] || '';
        document.getElementById('inApp').value = r['Aplica para'] || '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteRecord(id) {
        if(confirm('¿Eliminar este registro permanentemente?')) {
            db = db.filter(x => x.id !== id);
            populateDropdowns();
            filterData();
            updateMetaState();
            showToast('🗑️ Registro eliminado');
        }
    }

    // --- BÓVEDA HTML (SELF-SAVING) ---
    function updateMetaState() {
        const encodedStr = encodeURIComponent(JSON.stringify(db));
        document.getElementById('matrixData').setAttribute('data-state', encodedStr);
    }

    function saveAndExportHTML() {
        updateMetaState();
        const htmlContent = "<!DOCTYPE html>\n<html lang=\"es\">\n" + document.documentElement.innerHTML + "\n</html>";
        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
        
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Matriz_Tipificacion_Elite_${new Date().toISOString().split('T')[0]}.html`;
        a.click();
        
        URL.revokeObjectURL(a.href);
        showToast("✅ ¡Bóveda Descargada!");
    }
</script>
</body>
</html>
